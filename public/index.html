<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURVEYOR</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #070d12;
    --surface: #0e1a22;
    --border:  rgba(0, 255, 200, 0.18);
    --border2: rgba(0, 255, 200, 0.4);
    --text:    #f0f6f3;
    --muted:   #8ba89d;
    --cyan:    #00ffc8;
    --blue:    #38beff;
    --purple:  #b060ff;
    --green:   #00e676;
    --yellow:  #ffd740;
    --red:     #ff5370;
    --orange:  #ff9040;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid (subtil) ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,200,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,200,.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  body::after { display: none; }

  .app { max-width: 1320px; margin: 0 auto; padding: 0 28px 80px; position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 160px; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }

  .logo { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    position: relative;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark::before {
    content: '';
    position: absolute; inset: 0;
    border: 1px solid var(--cyan);
    transform: rotate(45deg);
    box-shadow: 0 0 12px rgba(0,255,200,.3), inset 0 0 12px rgba(0,255,200,.05);
  }
  .logo-mark span { font-size: 18px; color: var(--cyan); position: relative; z-index: 1; }

  .logo-text h1 {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,255,200,.5);
    line-height: 1;
  }
  .logo-text p {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: Consolas, 'Courier New', monospace;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .scan-time {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 13px;
    color: var(--muted);
  }
  .scan-time::before { content: '// '; color: var(--border2); }
  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--cyan);
    width: 34px; height: 34px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0% 100%, 0% 8px);
    transition: box-shadow .2s, background .2s;
  }
  .btn-refresh:hover { background: rgba(0,255,200,.08); box-shadow: 0 0 12px rgba(0,255,200,.3); }
  .btn-refresh.spinning { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Stats ── */
  .stats { display: flex; gap: 14px; margin-bottom: 28px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 22px;
    clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
    backdrop-filter: blur(10px);
    position: relative;
    min-width: 110px;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40%; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }
  .stat-value {
    font-size: 28px; font-weight: 700;
    line-height: 1;
    font-family: Consolas, 'Courier New', monospace;
  }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .c-cyan   { color: var(--cyan);   text-shadow: 0 0 15px rgba(0,255,200,.5); }
  .c-yellow { color: var(--yellow); text-shadow: 0 0 15px rgba(255,204,0,.4); }
  .c-green  { color: var(--green);  text-shadow: 0 0 15px rgba(0,255,136,.4); }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .filters { display: flex; gap: 2px; }
  .filter {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 18px;
    cursor: pointer;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.5px;
    transition: all .15s;
    position: relative;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .filter.active, .filter:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,255,200,.06);
    box-shadow: 0 0 8px rgba(0,255,200,.15);
  }
  .shown-count { font-family: Consolas, 'Courier New', monospace; font-size: 13px; color: var(--muted); }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }

  /* ── Card ── */
  .card {
    background: #0e1a22;
    border: 1px solid var(--border);
    padding: 20px;
    cursor: pointer;
    position: relative;
    clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px);
    transition: border-color .2s, box-shadow .2s, transform .15s;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 50%; height: 1px;
    background: linear-gradient(90deg, var(--accent-color, var(--cyan)), transparent);
    transition: width .3s;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--accent-color, var(--cyan)), transparent);
    opacity: .4;
  }
  .card.level-high { --accent-color: var(--green); }
  .card.level-mid  { --accent-color: var(--yellow); }
  .card.level-low  { --accent-color: var(--muted); }

  .card:hover {
    border-color: var(--accent-color, var(--cyan));
    box-shadow: 0 0 24px rgba(0,255,200,.12), 0 8px 32px rgba(0,0,0,.5);
    transform: translateY(-3px);
  }
  .card:hover::before { width: 100%; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .card-name {
    font-size: 16px; font-weight: 600;
    color: #ffffff;
  }
  .card-pct {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 17px; font-weight: 600;
    margin-left: 10px; flex-shrink: 0;
  }
  .card-pct.level-high { color: var(--green);  text-shadow: 0 0 10px rgba(0,255,136,.5); }
  .card-pct.level-mid  { color: var(--yellow); text-shadow: 0 0 10px rgba(255,204,0,.4); }
  .card-pct.level-low  { color: var(--muted); }

  /* Bar */
  .bar { height: 3px; background: rgba(255,255,255,.06); margin-bottom: 14px; position: relative; overflow: visible; }
  .bar-fill {
    height: 100%;
    position: relative;
    transition: width .5s ease;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -3px;
    width: 2px; height: 9px;
    background: inherit;
    filter: blur(2px);
    opacity: .8;
  }
  .bar-fill.level-high { background: var(--green);  box-shadow: 0 0 8px var(--green); }
  .bar-fill.level-mid  { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .bar-fill.level-low  { background: var(--muted); }

  /* Pills */
  .task-pills { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .pill { font-size: 12px; font-weight: 600; padding: 2px 9px; font-family: Consolas, 'Courier New', monospace; }
  .pill-done { border: 1px solid rgba(0,255,136,.3); color: var(--green);  background: rgba(0,255,136,.06); }
  .pill-wip  { border: 1px solid rgba(255,204,0,.3);  color: var(--yellow); background: rgba(255,204,0,.06); }
  .pill-todo { border: 1px solid rgba(74,122,106,.3);  color: var(--muted);  background: rgba(74,122,106,.06); }

  /* Commit */
  .commit { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 12px; min-width: 0; font-family: Consolas, 'Courier New', monospace; }
  .commit-hash { color: var(--blue); flex-shrink: 0; }
  .commit-msg  { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); opacity: .7; }
  .commit-age  { flex-shrink: 0; }

  /* Badges */
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px;
    font-family: Consolas, 'Courier New', monospace;
  }
  .badge-ok      { border: 1px solid rgba(0,255,200,.3); color: var(--cyan);   background: rgba(0,255,200,.05); }
  .badge-missing { border: 1px solid rgba(255,51,85,.2);  color: var(--red);    background: rgba(255,51,85,.04); opacity: .5; }
  .badge-branch  { border: 1px solid rgba(176,96,255,.3); color: var(--purple); background: rgba(176,96,255,.06); }
  .badge-dirty   { border: 1px solid rgba(255,119,34,.3); color: var(--orange); background: rgba(255,119,34,.06); }

  /* States */
  .empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 80px; font-family: Consolas, 'Courier New', monospace; }
  .error-banner { background: rgba(255,51,85,.06); border: 1px solid rgba(255,51,85,.25); color: var(--red); padding: 14px 18px; margin-bottom: 20px; font-family: Consolas, 'Courier New', monospace; font-size: 12px; }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,5,8,.8);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 48px 16px;
    z-index: 100;
    overflow-y: auto;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(4px);
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: rgba(8, 20, 28, 0.95);
    border: 1px solid var(--border2);
    width: 100%; max-width: 820px;
    padding: 32px;
    position: relative;
    clip-path: polygon(20px 0%, 100% 0%, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0% 100%, 0% 20px);
    transform: translateY(16px);
    transition: transform .25s;
    box-shadow: 0 0 60px rgba(0,255,200,.08), 0 24px 64px rgba(0,0,0,.8);
  }
  .modal::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 200px; height: 1px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }
  .modal::after {
    content: '';
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--cyan), transparent 60%);
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .modal-header h2 { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: var(--cyan); text-shadow: 0 0 20px rgba(0,255,200,.4); }
  .btn-close {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 16px; cursor: pointer;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);
    transition: all .15s;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }
  .modal-spec { font-size: 15px; color: var(--muted); margin-bottom: 28px; padding-left: 2px; font-style: italic; }

  .modal-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  @media (max-width: 620px) { .modal-cols { grid-template-columns: 1fr; } }

  .section-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--cyan); opacity: .8;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .task-group { margin-bottom: 16px; }
  .task-group-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .task-row { display: flex; gap: 10px; font-size: 14px; padding: 4px 0; align-items: baseline; color: var(--text); }
  .task-row.done { color: var(--muted); text-decoration: line-through; }
  .task-row.wip  { color: var(--yellow); }
  .task-icon { flex-shrink: 0; font-size: 11px; font-family: Consolas, 'Courier New', monospace; }

  .phase { margin-bottom: 14px; }
  .phase-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; font-weight: 600; }
  .phase-header .pct { font-family: Consolas, 'Courier New', monospace; font-size: 13px; color: var(--muted); }
  .phase.done        .phase-header { color: var(--muted); }
  .phase.in_progress .phase-header { color: var(--yellow); }
  .phase-bar { height: 2px; background: rgba(255,255,255,.06); overflow: hidden; }
  .phase-fill { height: 100%; }
  .phase.done        .phase-fill { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .phase.in_progress .phase-fill { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .phase.todo        .phase-fill { background: var(--muted); }

  .git-meta { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .commits { display: flex; flex-direction: column; gap: 8px; }
  .commit-row { display: flex; gap: 10px; font-size: 13px; align-items: baseline; min-width: 0; font-family: Consolas, 'Courier New', monospace; }
  .commit-row .commit-msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); opacity: .8; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  .commit-row .commit-age { color: var(--muted); flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark"><span>◈</span></div>
      <div class="logo-text">
        <h1>Surveyor</h1>
        <p>Project Intelligence System</p>
      </div>
    </div>
    <div class="header-right">
      <span class="scan-time" id="scanTime">connecting...</span>
      <button class="btn-refresh" id="btnRefresh" title="Refresh">↺</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>
  <div id="errorBanner"></div>

  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="active">Active</button>
      <button class="filter" data-filter="incomplete">Incomplete</button>
    </div>
    <span class="shown-count" id="shownCount"></span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="btn-close" id="btnClose">✕</button>
    </div>
    <p class="modal-spec" id="modalSpec"></p>
    <div class="modal-cols" id="modalCols"></div>
  </div>
</div>

<script>
const API = '/api/projects'
const POLL = 30_000

let allProjects = []
let currentFilter = 'all'

async function load(spinner = true) {
  if (spinner) document.getElementById('btnRefresh').classList.add('spinning')
  try {
    const res = await fetch(API)
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    const { projects, scannedAt } = await res.json()
    allProjects = projects
    document.getElementById('errorBanner').innerHTML = ''
    document.getElementById('scanTime').textContent = `LAST SYNC ${fmt(scannedAt)}`
    render()
  } catch (e) {
    document.getElementById('errorBanner').innerHTML =
      `<div class="error-banner">! SYSTEM OFFLINE — ${e.message}</div>`
  } finally {
    document.getElementById('btnRefresh').classList.remove('spinning')
  }
}

function render() {
  const filtered = applyFilter(allProjects, currentFilter)
  renderStats(allProjects)
  renderGrid(filtered)
  document.getElementById('shownCount').textContent = `${filtered.length} nodes`
}

function applyFilter(projects, f) {
  if (f === 'active')     return projects.filter(p => p.tasks?.counts.inProgress > 0)
  if (f === 'incomplete') return projects.filter(p => completion(p) < 100)
  return projects
}

function renderStats(projects) {
  const total    = projects.length
  const active   = projects.filter(p => p.tasks?.counts.inProgress > 0).length
  const complete = projects.filter(p => completion(p) === 100).length
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-value c-cyan">${total}</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value c-yellow">${active}</span><span class="stat-label">Active</span></div>
    <div class="stat"><span class="stat-value c-green">${complete}</span><span class="stat-label">Complete</span></div>
  `
}

function renderGrid(projects) {
  const grid = document.getElementById('grid')
  if (!projects.length) {
    grid.innerHTML = '<div class="empty">// NO NODES FOUND — ADD CONTRACT FILES TO PROJECTS</div>'
    return
  }
  grid.innerHTML = projects.map(cardHtml).join('')
  grid.querySelectorAll('.card').forEach((el, i) =>
    el.addEventListener('click', () => openModal(projects[i]))
  )
}

function cardHtml(p) {
  const pct   = completion(p)
  const level = lvl(pct)
  const t     = p.tasks?.counts
  const lc    = p.git?.lastCommit

  const pills = t ? `
    <div class="task-pills">
      ${t.done       ? `<span class="pill pill-done">${t.done}✓</span>` : ''}
      ${t.inProgress ? `<span class="pill pill-wip">${t.inProgress}◐</span>` : ''}
      ${t.todo       ? `<span class="pill pill-todo">${t.todo}○</span>` : ''}
    </div>` : ''

  const commit = lc ? `
    <div class="commit">
      <span class="commit-hash">${lc.hash}</span>
      <span class="commit-msg">${esc(lc.message)}</span>
      <span class="commit-age">${age(lc.date)}</span>
    </div>` : ''

  const { spec, plan, tasks, claude } = p.contractHealth
  const branch = p.git?.currentBranch
  const dirty  = p.git?.uncommittedChanges

  return `
    <div class="card level-${level}">
      <div class="card-top">
        <span class="card-name">${esc(p.name)}</span>
        <span class="card-pct level-${level}">${pct}%</span>
      </div>
      <div class="bar"><div class="bar-fill level-${level}" style="width:${pct}%"></div></div>
      ${pills}
      ${commit}
      <div class="badges">
        ${badge('SPEC',   spec)}
        ${badge('PLAN',   plan)}
        ${badge('TASKS',  tasks)}
        ${badge('CLAUDE', claude)}
        ${branch ? `<span class="badge badge-branch">${esc(branch)}</span>` : ''}
        ${dirty  ? `<span class="badge badge-dirty">${dirty}~</span>` : ''}
      </div>
    </div>`
}

function badge(label, present) {
  return `<span class="badge ${present ? 'badge-ok' : 'badge-missing'}">${label}</span>`
}

function openModal(p) {
  document.getElementById('modalTitle').textContent = p.name
  document.getElementById('modalSpec').textContent  = p.specSummary ?? ''
  document.getElementById('modalCols').innerHTML    = modalCols(p)
  document.getElementById('overlay').classList.add('open')
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open')
}

function modalCols(p) {
  const cols = []
  if (p.tasks) cols.push(tasksSection(p.tasks))
  if (p.plan)  cols.push(planSection(p.plan))
  if (p.git)   cols.push(gitSection(p.git))
  return cols.map(c => `<div>${c}</div>`).join('')
}

function tasksSection({ sections, counts }) {
  const groups = [
    { key: 'mustHave',   label: 'Must Have' },
    { key: 'shouldHave', label: 'Should Have' },
    { key: 'couldHave',  label: 'Could Have' },
  ]
  const html = groups.map(({ key, label }) => {
    const items = sections[key]
    if (!items?.length) return ''
    return `<div class="task-group">
      <div class="task-group-label">${label}</div>
      ${items.map(t => `
        <div class="task-row ${t.status === 'done' ? 'done' : t.status === 'in_progress' ? 'wip' : ''}">
          <span class="task-icon">${t.status === 'done' ? '✓' : t.status === 'in_progress' ? '◐' : '○'}</span>
          <span>${esc(t.title)}</span>
        </div>`).join('')}
    </div>`
  }).join('')
  return `<div class="section-title">Tasks <span style="opacity:.5;font-size:10px">${counts.done}/${counts.total}</span></div>${html}`
}

function planSection({ phases }) {
  const html = phases.map(ph => `
    <div class="phase ${ph.status}">
      <div class="phase-header">
        <span>${esc(ph.name)}</span>
        <span class="pct">${ph.completion}%</span>
      </div>
      <div class="phase-bar">
        <div class="phase-fill" style="width:${ph.completion}%"></div>
      </div>
    </div>`).join('')
  return `<div class="section-title">Plan</div>${html}`
}

function gitSection(git) {
  const meta = `<div class="git-meta">
    <span class="badge badge-branch">${esc(git.currentBranch)}</span>
    ${git.uncommittedChanges ? `<span class="badge badge-dirty">${git.uncommittedChanges} uncommitted</span>` : ''}
  </div>`
  const commits = git.recentCommits.map(c => `
    <div class="commit-row">
      <span class="commit-hash">${c.hash}</span>
      <span class="commit-msg">${esc(c.message)}</span>
      <span class="commit-age">${age(c.date)}</span>
    </div>`).join('')
  return `<div class="section-title">Git Log</div>${meta}<div class="commits">${commits}</div>`
}

function completion(p) {
  return p.tasks?.completion ?? (p.plan ? planCompletion(p.plan) : 0)
}
function planCompletion(plan) {
  const all = plan.phases.flatMap(p => p.steps)
  if (!all.length) return 0
  return Math.round(all.filter(s => s.status === 'done').length / all.length * 100)
}
function lvl(pct) { return pct >= 80 ? 'high' : pct >= 30 ? 'mid' : 'low' }
function age(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000)
  if (s < 60)    return `${s}s`
  if (s < 3600)  return `${Math.floor(s/60)}m`
  if (s < 86400) return `${Math.floor(s/3600)}h`
  return `${Math.floor(s/86400)}d`
}
function fmt(iso) { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

document.getElementById('btnRefresh').addEventListener('click', () => load())
document.getElementById('btnClose').addEventListener('click', closeModal)
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal() })
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter')
  if (!btn) return
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  currentFilter = btn.dataset.filter
  render()
})
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

load()
setInterval(() => load(false), POLL)
</script>
</body>
